name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Write Capacitor config
        run: |
          printf '%s\n' \
            '{' \
            '  "appId": "com.hebrewtg.app",' \
            '  "appName": "Hebrew for Tigrinya",' \
            '  "webDir": "www",' \
            '  "bundledWebRuntime": false,' \
            '  "android": { "allowMixedContent": true }' \
            '}' > capacitor.config.json

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Allow cleartext traffic for Google TTS
        run: |
          mkdir -p android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<network-security-config>\n  <domain-config cleartextTrafficPermitted="true">\n    <domain includeSubdomains="true">translate.googleapis.com</domain>\n  </domain-config>\n  <base-config cleartextTrafficPermitted="false"/>\n</network-security-config>\n' > android/app/src/main/res/xml/network_security_config.xml
          sed -i 's/android:label="Hebrew for Tigrinya"/android:label="Hebrew for Tigrinya" android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml || true

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate ephemeral keystore
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -keystore release.keystore \
            -storepass ephemeral123 \
            -keypass ephemeral123 \
            -dname "CN=HebrewTG, OU=App, O=HebrewTG, L=TLV, S=IL, C=IL"

      - name: Fix Kotlin stdlib duplicates
        run: |
          printf '\nsubprojects {\n    configurations.all {\n        resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.9.10" }\n        exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\n        exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\n    }\n}\n' >> android/build.gradle

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=hebrew-tigrinya-release.apk
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)
          $BUILD_TOOLS/zipalign -v 4 "$UNSIGNED" aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks release.keystore \
            --ks-key-alias release \
            --ks-pass pass:ephemeral123 \
            --key-pass pass:ephemeral123 \
            --out "$SIGNED" \
            aligned.apk
          echo "APK signed: $SIGNED"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hebrew-tigrinya-apk
          path: hebrew-tigrinya-release.apk
          retention-days: 7
