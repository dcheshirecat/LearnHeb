name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Write Capacitor config
        run: |
          printf '%s\n' \
            '{' \
            '  "appId": "com.hebrewtg.app",' \
            '  "appName": "ዕብራይስጥ ተምሃር",' \
            '  "webDir": "www",' \
            '  "bundledWebRuntime": false,' \
            '  "android": { "allowMixedContent": true }' \
            '}' > capacitor.config.json

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Set app label to Tigrinya in strings.xml
        run: |
          STRINGS=android/app/src/main/res/values/strings.xml
          if [ -f "$STRINGS" ]; then
            sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">ዕብራይስጥ ተምሃር</string>|" "$STRINGS"
          else
            mkdir -p android/app/src/main/res/values
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">ዕብራይስጥ ተምሃር</string>\n</resources>\n' > "$STRINGS"
          fi

      - name: Generate app icon (gold aleph on dark background)
        run: |
          pip install Pillow --break-system-packages --quiet
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os, shutil

          SIZES = {
            'mipmap-mdpi':    48,
            'mipmap-hdpi':    72,
            'mipmap-xhdpi':   96,
            'mipmap-xxhdpi':  144,
            'mipmap-xxxhdpi': 192,
          }
          BASE = 'android/app/src/main/res'

          for folder, size in SIZES.items():
            path = f'{BASE}/{folder}'
            os.makedirs(path, exist_ok=True)
            img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
            draw = ImageDraw.Draw(img)

            # Rounded rect background (dark)
            r = size // 5
            draw.rounded_rectangle([0, 0, size-1, size-1], radius=r, fill=(13, 17, 23, 255))

            # Gold gradient simulation: draw two overlapping rects
            draw.rounded_rectangle([0, 0, size-1, size//2], radius=r, fill=(240, 165, 0, 255))
            draw.rounded_rectangle([0, size//2, size-1, size-1], radius=r, fill=(255, 209, 102, 255))
            # Re-draw corners to keep shape
            draw.rounded_rectangle([0, 0, size-1, size-1], radius=r, fill=None, outline=(13,17,23,255), width=0)

            # Aleph letter centered
            font_size = int(size * 0.62)
            try:
              font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSerif-Bold.ttf', font_size)
            except:
              font = ImageFont.load_default()

            letter = '\u05d0'  # Aleph
            bbox = draw.textbbox((0, 0), letter, font=font)
            tw = bbox[2] - bbox[0]
            th = bbox[3] - bbox[1]
            x = (size - tw) // 2 - bbox[0]
            y = (size - th) // 2 - bbox[1]
            draw.text((x, y), letter, fill=(13, 17, 23, 255), font=font)

            img.save(f'{path}/ic_launcher.png')
            # Also save round version
            img.save(f'{path}/ic_launcher_round.png')
            print(f'  {folder}: {size}x{size}')
          print('Icons generated.')
          PYEOF

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate ephemeral keystore
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -keystore release.keystore \
            -storepass ephemeral123 \
            -keypass ephemeral123 \
            -dname "CN=HebrewTG, OU=App, O=HebrewTG, L=TLV, S=IL, C=IL"

      - name: Fix Kotlin stdlib duplicates
        run: |
          printf '\nsubprojects {\n    configurations.all {\n        resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.9.10" }\n        exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"\n        exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"\n    }\n}\n' >> android/build.gradle

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=hebrew-tigrinya-release.apk
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)
          $BUILD_TOOLS/zipalign -v 4 "$UNSIGNED" aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks release.keystore \
            --ks-key-alias release \
            --ks-pass pass:ephemeral123 \
            --key-pass pass:ephemeral123 \
            --out "$SIGNED" \
            aligned.apk
          echo "APK signed: $SIGNED"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hebrew-tigrinya-apk
          path: hebrew-tigrinya-release.apk
          retention-days: 7
